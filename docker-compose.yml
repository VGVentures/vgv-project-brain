version: "3.8"
services:
  rag-service:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - model-cache:/app/.cache/sentence-transformers
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  model-cache:
